name: 💡 Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        💡 Have an idea for a new feature? We'd love to hear it!

        Please fill out the details below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: |
        Describe the problem you're trying to solve.
        Why is this feature needed? What user pain point does it address?
      placeholder: "I often find that..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: |
        Describe what you'd like to happen.
        How should this feature work?
      placeholder: "It would be great if..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you've considered.
      placeholder: "I've tried..."
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, mockups, or other supporting materials
      placeholder: Add any screenshots, diagrams, or mockups here
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and confirmed this is a new feature request
          required: true
        - label: This feature aligns with the project's goals and design philosophy
          required: true
